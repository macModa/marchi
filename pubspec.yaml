name: marchi
description: "Marché Artisanal Tunisien - Application Flutter"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.3.1
  google_fonts: ^6.1.0
  firebase_core: ^2.20.0
  firebase_storage: ^11.0.10
  firebase_storage_web: ^3.6.23
  js: ^0.6.6
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Network
  dio: ^5.4.0
  http: ^1.2.0
  
  # Storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  
  # Navigation
  go_router: ^17.0.1
  
  # Utilities
  intl: ^0.20.2
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  logger: ^2.0.2+1
  image_picker: ^1.0.7
  url_launcher: ^6.3.2
  font_awesome_flutter: ^10.12.0
  open_filex: ^4.4.1        # replaced open_file_plus (unmaintained, v1 embedding)
  fpdart: ^1.2.0

  # Bon de Livraison — PDF generation & QR code
  pdf: ^3.10.8
  printing: ^5.13.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.9.2
  riverpod_generator: ^2.6.3
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

dependency_overrides:
  firebase_storage_web: ^3.6.23
  js: ^0.6.6
